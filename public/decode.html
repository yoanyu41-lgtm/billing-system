<!DOCTYPE html>
<html>
<head>
    <title>Decode QR</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <h1>Decoding QR...</h1>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="result">Waiting...</div>

    <script>
        // Load the company QR image path from setting
        const imageUrl = "/storage/{{ \App\Models\Setting::where('key', 'company_bank_qr')->value('value') }}";
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            
            if (code) {
                document.getElementById('result').innerText = "Found: " + code.data;
                // Send back to save
                fetch('/save_qr_text.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ qr_text: code.data })
                }).then(res => res.json())
                  .then(data => {
                      document.getElementById('result').innerText += " (Saved)";
                  });
            } else {
                document.getElementById('result').innerText = "QR Code not found or couldn't be decoded.";
            }
        };
        img.onerror = function() {
            document.getElementById('result').innerText = "Failed to load image from: " + imageUrl;
        };
        img.src = "{{ asset('storage/' . \App\Models\Setting::where('key', 'company_bank_qr')->value('value')) }}";
    </script>
</body>
</html>
